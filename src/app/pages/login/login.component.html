<div class="login-wrapper">
  <div class="login-left">
    <h1>Explore Together</h1>
    <p>Your next favorite experience awaits.</p>
  </div>

  <div class="login-card">
    <ng-container *ngIf="step === 'login'">
      <h2>Login</h2>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="button-group">
        <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
          {{ loading ? 'Please wait...' : 'Sign In' }}
        </button>
        <button class="btn-secondary" (click)="goToRegister()">Register</button>
      </div>
    </ng-container>

    <ng-container *ngIf="step === 'otp'">
      <h2>Enter OTP</h2>
      <p class="otp-hint">Check your backend terminal for the OTP code</p>

      <div class="form-group">
        <label>OTP</label>
        <input type="text" [(ngModel)]="otp" placeholder="Enter 6-digit OTP" maxlength="6" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="button-group">
        <button class="btn-primary" (click)="onVerifyOtp()" [disabled]="loading">
          {{ loading ? 'Verifying...' : 'Verify OTP' }}
        </button>
      </div>
    </ng-container>
  </div>
</div>
